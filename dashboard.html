<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance en cours</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --text-color: #1f2937;
            --bg-color: #f9fafb;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        /* Style du SVG */
        .illustration {
            width: 100%;
            max-width: 300px;
            margin-bottom: 2rem;
        }

        .gear {
            animation: spin 4s linear infinite;
            transform-origin: center;
        }

        .gear-reverse {
            animation: spin-reverse 4s linear infinite;
            transform-origin: center;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes spin-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #6b7280;
        }

        .loader {
            margin-top: 2rem;
            display: inline-block;
            width: 50px;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loader::after {
            content: '';
            position: absolute;
            left: -50%;
            height: 100%;
            width: 50%;
            background: var(--primary-color);
            animation: loading 1.5s infinite ease-in-out;
        }

        @keyframes loading {
            0% { left: -50%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <svg class="illustration" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <g class="gear" fill="#4f46e5">
                <path d="M100,70c-16.6,0-30,13.4-30,30s13.4,30,30,30s30-13.4,30-30S116.6,70,100,70z M100,120c-11,0-20-9-20-20s9-20,20-20s20,9,20,20S111,120,100,120z"/>
                <path d="M105,40V25h-10v15c-3.5,0.7-6.8,1.9-9.8,3.5l-10.6-10.6l-7.1,7.1l10.6,10.6c-1.6,3-2.8,6.3-3.5,9.8H60v10h15c0.7,3.5,1.9,6.8,3.5,9.8l-10.6,10.6l7.1,7.1l10.6-10.6c3,1.6,6.3,2.8,9.8,3.5V175h10v-15c3.5-0.7,6.8-1.9,9.8-3.5l10.6,10.6l7.1-7.1l-10.6-10.6c1.6-3,2.8-6.3,3.5-9.8H140v-10h-15c-0.7-3.5-1.9-6.8-3.5-9.8l10.6-10.6l-7.1-7.1l-10.6,10.6C111.8,41.9,108.5,40.7,105,40z"/>
            </g>
            <g class="gear-reverse" fill="#93c5fd">
                <path d="M150,130c-8.3,0-15,6.7-15,15s6.7,15,15,15s15-6.7,15-15S158.3,130,150,130z M150,155c-5.5,0-10-4.5-10-10s4.5-10,10-10s10,4.5,10,10S155.5,155,150,155z"/>
                <path d="M152.5,115v-7.5h-5v7.5c-1.8,0.4-3.4,1-4.9,1.8l-5.3-5.3l-3.5,3.5l5.3,5.3c-0.8,1.5-1.4,3.1-1.8,4.9H130v5h7.5c0.4,1.8,1,3.4,1.8,4.9l-5.3,5.3l3.5,3.5l5.3-5.3c1.5,0.8,3.1,1.4,4.9,1.8v7.5h5v-7.5c1.8-0.4,3.4-1,4.9-1.8l5.3,5.3l3.5-3.5l-5.3-5.3c0.8-1.5,1.4-3.1,1.8-4.9H170v-5h-7.5c-0.4-1.8-1-3.4-1.8-4.9l5.3-5.3l-3.5-3.5l-5.3,5.3C155.9,116,154.3,115.4,152.5,115z"/>
            </g>
        </svg>

        <h1>On revient vite !</h1>
        <p>Notre site subit actuellement une petite mise à jour pour améliorer votre expérience. Merci de votre patience, nous serons de retour dans quelques instants.</p>
        
        <div class="loader"></div>
    </div>

</body>
</html>
