<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retour Bientôt | Maintenance</title>
    <style>
        :root {
            --bg-color: #1a1a2e; /* Bleu très sombre pour le fond */
            --text-color: #eaeaea; /* Gris clair pour le texte principal */
            --sub-text-color: #a0a0b0; /* Gris moyen pour le sous-texte */
            --accent-color: #4158d0; /* Bleu vif pour l'accentuation */
            --accent-color-light: #c850c0; /* Violet clair pour le gradient */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', 'Open Sans', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        /* SVG de Chargement Minimaliste */
        .loading-svg {
            width: 80px;
            height: 80px;
        }

        .loading-circle {
            animation: rotate 1.5s linear infinite;
            transform-origin: center;
        }

        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-path {
            stroke-dasharray: 1, 200;
            stroke-dashoffset: 0;
            animation: dash 1.5s ease-in-out infinite, color 6s ease-in-out infinite;
            stroke-linecap: round;
        }

        @keyframes dash {
            0% {
                stroke-dasharray: 1, 200;
                stroke-dashoffset: 0;
            }
            50% {
                stroke-dasharray: 89, 200;
                stroke-dashoffset: -35px;
            }
            100% {
                stroke-dasharray: 89, 200;
                stroke-dashoffset: -124px;
            }
        }

        @keyframes color {
            100%, 0% {
                stroke: var(--accent-color);
            }
            40% {
                stroke: var(--accent-color-light);
            }
            66% {
                stroke: var(--accent-color);
            }
            80% {
                stroke: var(--accent-color-light);
            }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        p {
            font-size: 1rem;
            margin: 0;
            color: var(--sub-text-color);
            line-height: 1.5;
        }

    </style>
</head>
<body>

    <div class="container">
        <svg class="loading-svg" viewBox="25 25 50 50">
            <circle class="loading-circle loading-path" cx="50" cy="50" r="20" fill="none" stroke-width="3" stroke-miterlimit="10"/>
        </svg>

        <h1>RETOUR BIENTÔT</h1>
        
        <p>Nous apportons quelques améliorations pour vous offrir une meilleure expérience. Merci de patienter un instant.</p>
    </div>

</body>
</html>
