<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>404 — Page introuvable | Dev Center</title>
  <link rel="icon" href="https://cdn.discordapp.com/icons/1452963098284785765/4255d99dd972ab407c31044fe9a899b0.png?size=64" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;background:#08080f;color:#fff;font-family:'Outfit',sans-serif;overflow:hidden;}
    canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px;}
    .code{font-family:'Syne',sans-serif;font-size:clamp(80px,18vw,180px);font-weight:800;line-height:1;background:linear-gradient(135deg,#4f6ef7,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;user-select:none;margin-bottom:8px;}
    .title{font-family:'Syne',sans-serif;font-size:clamp(18px,4vw,28px);font-weight:700;margin-bottom:12px;color:#fff;}
    .sub{font-size:14px;color:rgba(255,255,255,.4);max-width:360px;line-height:1.7;margin-bottom:36px;}
    .url-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 18px;font-family:monospace;font-size:12px;color:rgba(255,255,255,.3);margin-bottom:36px;max-width:400px;word-break:break-all;}
    .btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
    .btn-home{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#4f6ef7,#6c3aed);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;text-decoration:none;font-family:'Outfit',sans-serif;transition:opacity .2s;}
    .btn-home:hover{opacity:.85;}
    .btn-disc{display:inline-flex;align-items:center;gap:8px;background:rgba(88,101,242,.15);color:#818cf8;border:1px solid rgba(88,101,242,.25);padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;text-decoration:none;font-family:'Outfit',sans-serif;transition:all .2s;}
    .btn-disc:hover{background:rgba(88,101,242,.25);}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="wrap">
  <div class="code">404</div>
  <div class="title">Page introuvable</div>
  <p class="sub">Cette page n'existe pas ou a été déplacée. Vérifie l'URL et réessaie.</p>
  <div class="url-box" id="bad-url"></div>
  <div class="btns">
    <a href="/" class="btn-home">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Retour à l'accueil
    </a>
    <a href="https://discord.gg/9KqXrKyTfA" target="_blank" class="btn-disc">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
      Support Discord
    </a>
  </div>
</div>
<script>
  // Show the bad URL
  document.getElementById('bad-url').textContent = window.location.href;

  // Stars
  (function(){
    var c=document.getElementById('c'),ctx=c.getContext('2d'),W,H,stars=[];
    function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
    function make(){stars=[];var n=Math.floor(W*H/4000);for(var i=0;i<n;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*.9+.15,o:Math.random()*.5+.1,s:Math.random()*.3+.1,t:Math.random()*Math.PI*2});}
    function draw(){ctx.clearRect(0,0,W,H);stars.forEach(function(s){s.t+=s.s*.012;s.o=.15+.35*Math.sin(s.t);ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(160,180,255,'+s.o+')';ctx.fill();});requestAnimationFrame(draw);}
    resize();make();draw();window.addEventListener('resize',function(){resize();make();});
  })();
</script>
</body>
</html>
